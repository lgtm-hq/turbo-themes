---
name: Vulnerability Suppression Check

on:
  schedule:
    # Weekly on Monday at 04:00 UTC
    - cron: '0 4 * * 1'
  workflow_dispatch:

permissions: {}

env:
  LINTRO_IMAGE: ghcr.io/lgtm-hq/py-lintro:0.57.1

jobs:
  check-suppressions:
    name: "\U0001F50D Suppression Staleness Check"
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
    timeout-minutes: 10
    steps:
      - uses: step-security/harden-runner@e3f713f2d8f53843e71c69a996d56f51aa9adfb9 # v2.14.1
        if: ${{ !env.ACT }}
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            api.osv.dev:443
            api.deps.dev:443
            github.com:443
            ghcr.io:443
            objects.githubusercontent.com:443
            pkg-containers.githubusercontent.com:443
            codeload.github.com:443

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Pull py-lintro Docker image
        run: ./scripts/ci/pull-lintro-image.sh

      - name: Check suppression staleness
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/ci/check-vuln-suppressions.sh
