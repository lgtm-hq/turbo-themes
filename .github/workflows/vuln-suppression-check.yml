---
name: Vulnerability Suppression Check

on:
  schedule:
    # Weekly on Monday at 04:00 UTC
    - cron: '0 4 * * 1'
  workflow_dispatch:

permissions: {}

jobs:
  check-suppressions:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-vuln-suppression-check.yml@66cad82ead0e5d119928c895c7d7da9c837989e5 # v0.52.3
    with:
      job-name: '🔍 Suppression Staleness Check'
      workflow-file: vuln-suppression-check.yml
      runner-image: ubuntu-24.04
      tooling-ref: '66cad82ead0e5d119928c895c7d7da9c837989e5' # v0.52.3
      egress-policy: block
      egress-preset: osv-scanner
    permissions:
      contents: write
      pull-requests: write
    secrets:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
