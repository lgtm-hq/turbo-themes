# SPDX-License-Identifier: MIT
---
name: PR - Auto Assign

# Automatically assigns a random CODEOWNER to new pull requests.
# Ensures every PR has an assignee for accountability.

'on':
  pull_request_target:
    types: [opened]

permissions: {}

concurrency:
  group: pr-auto-assign-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  assign:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-pr-auto-assign.yml@66cad82ead0e5d119928c895c7d7da9c837989e5 # v0.52.3
    with:
      codeowners-path: .github/CODEOWNERS
      job-name: '👤 Auto Assign CODEOWNER'
      runner-image: ubuntu-24.04
      tooling-ref: '66cad82ead0e5d119928c895c7d7da9c837989e5' # v0.52.3
      egress-policy: block
      egress-preset: github-tooling
    permissions:
      contents: read
      pull-requests: write
