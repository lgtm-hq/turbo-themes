---
name: Maintenance - Auto-bump Internal References
# Automatically updates internal workflow and action SHA references to latest commit.
# Creates PR with updated references to maintain security pinning compliance.

on:
  push:
    branches: [main]
    paths:
      - .github/actions/**
      - .github/workflows/reusable-*.yml
  workflow_dispatch:
    inputs:
      sha:
        description: Provide the full 40-char commit SHA to pin internal refs to
        required: true
        type: string

permissions:
  contents: read

jobs:
  bump:
    if: >-
      ${{ github.event_name == 'workflow_dispatch' || (
          github.ref == 'refs/heads/main' &&
          !contains(github.event.head_commit.message, 'bump internal refs') &&
          !startsWith(github.event.head_commit.message, 'chore(release):')
      ) }}
    name: 🔄 Update Internal SHA References
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: auto-bump-refs-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Harden Runner
        if: ${{ !env.ACT }}
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            codeload.github.com:443
            github.com:443
            objects.githubusercontent.com:443
            pkg-containers.githubusercontent.com:443

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine target SHA
        id: sha
        run: ./scripts/ci/determine-target-sha.sh
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_SHA: ${{ inputs.sha || '' }}
          GITHUB_SHA: ${{ github.sha }}

      - name: Update internal references
        run: ./scripts/ci/update-internal-refs.sh "${{ steps.sha.outputs.sha }}"

      # No explicit change detection: peter-evans/create-pull-request exits
      # silently without creating a PR when the working tree has no changes.
      # The local scripts/ci/detect-changes.sh gate was retired (lgtm-ci#484);
      # path-filter use cases use the lgtm-ci detect-changes composite instead.
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message:
            'chore: bump internal workflow/action refs to ${{ steps.sha.outputs.sha }}'
          title: 'chore: bump internal refs to latest SHA'
          body: |
            Automated update of internal action/workflow references to the
            latest commit SHA to satisfy org policy for pinned refs.

            **Target SHA:** `${{ steps.sha.outputs.sha }}`
          branch: chore/bump-internal-refs
          labels: maintenance
          delete-branch: true
