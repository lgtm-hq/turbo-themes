---
name: Quality Check - Theme Sync Determinism

on:
  pull_request:
    paths:
      - 'scripts/**'
      - 'src/themes/**'
      - 'assets/data/**'
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read

concurrency:
  group: theme-sync-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-determinism:
    name: 🔍 Verify Theme Sync Determinism
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Harden Runner
        if: ${{ !env.ACT }}
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            bun.sh:443
            cdn.jsdelivr.net:443
            codeload.github.com:443
            files.pythonhosted.org:443
            github-releases.githubusercontent.com:443
            github.com:443
            npmjs.org:443
            objects.githubusercontent.com:443
            pkg-containers.githubusercontent.com:443
            pypi.org:443
            registry.npmjs.org:443
            release-assets.githubusercontent.com:443
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup environment
        uses: ./.github/actions/setup-env
        with:
          node-version: '22'
          skip-ruby: 'true'
      - name: Build TypeScript
        run: bun run build
      - name: Run theme sync determinism check
        run: ./scripts/ci/theme-sync-determinism-check.sh
      - name: Run test suite (quick)
        run: bun run test --silent
