---
name: Publish - npm Test/Beta

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'npm dist-tag to publish under (e.g., beta, next, canary)'
        required: true
        type: string
        default: 'beta'

permissions:
  contents: read

concurrency:
  group: publish-test-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Uses trust-and-skip pattern: manual test workflow, keeps SBOM for publish
  # testing. Report mode generates a CycloneDX SBOM plus a signed provenance
  # attestation via the org lgtm-ci reusable (replaces the former local
  # reusable-sbom.yml).
  sbom:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-sbom.yml@ee8484ca71db3a2c2c33da6128bbf2330fcd7c88 # v0.59.2
    with:
      job-name: '📋 Generate & Sign SBOM'
      target: .
      target-type: dir
      scan-vulnerabilities: false
      create-attestation: true
      tooling-ref: 'ee8484ca71db3a2c2c33da6128bbf2330fcd7c88' # v0.59.2
      egress-policy: block
      egress-preset: sbom
    permissions:
      contents: write
      security-events: write
      id-token: write
      attestations: write

  publish:
    name: 📦 Publish to npm (Test)
    needs: [sbom]
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            objects.githubusercontent.com:443
            pkg-containers.githubusercontent.com:443
            codeload.github.com:443
            registry.npmjs.org:443
            bun.sh:443

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.13'

      - name: Setup Node.js for npm publish
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build package
        run: bun run build

      - name: Build theme CSS
        run: bun run build:themes

      - name: Publish to npm with custom tag
        run: npm publish --access public --provenance --tag=${{ inputs.tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Summary
        run: ./scripts/ci/generate-npm-test-summary.sh "${{ inputs.tag }}"
