---
name: Security - SBOM Generation

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: sbom-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sbom:
    name: 📋 Generate & Sign Software Bill of Materials
    uses: ./.github/workflows/reusable-sbom.yml
    permissions:
      contents: read
      id-token: write
