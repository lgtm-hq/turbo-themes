name: Quality Check - CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
  merge_group:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ============================================================================
# ENVIRONMENT VARIABLES
# ============================================================================
# CHECKOUT_FETCH_DEPTH controls the depth of git history fetched by the
# checkout action. Shallow clones (default: 1) are faster but may cause issues
# with scripts that need commit history.
#
# Trade-offs:
#   - fetch-depth: 1   (default) - Fastest, minimal bandwidth, may have issues with history-dependent checks
#   - fetch-depth: 50  - Balanced, usually sufficient for PR scenarios
#   - fetch-depth: 0   - Full history, slowest, resolves most edge cases
#
# For most PRs, depth=1 works fine. If you see "bad object" or ancestry
# errors, increase to 50 or 0.
env:
  CHECKOUT_FETCH_DEPTH: 1

jobs:
  # Matrix build legs via the lgtm-ci build-artifact reusable (lgtm-ci#520).
  # Org ruleset contexts: build / 🏗️ Build & Quality Checks (20) and (22).
  # Matrix mode appends -<node-version> to the artifact name, so the legs
  # upload js-dist-20 / js-dist-22; downstream consumers download js-dist-22.
  # The node-22-only reporting side effects of the old matrix job (Codecov,
  # coverage comment/badges, Pages coverage-html, SBOM artifact) are not
  # expressible through the reusable's inputs and live in the reporting job.
  build:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-build-artifact.yml@443a687caa93b3afa306a066aae8d8a2b4e60c3c # v0.59.0
    with:
      job-name: '🏗️ Build & Quality Checks'
      node-version-matrix: '["20","22"]'
      build-command: ./scripts/ci/bootstrap-build-quick.sh
      artifact-name: js-dist
      artifact-path: dist
      retention-days: 7
      timeout-minutes: 45
      tooling-ref: '443a687caa93b3afa306a066aae8d8a2b4e60c3c'  # v0.59.0
      egress-policy: block
      # Complete enforced allowlist (pre-enforcement replace semantics):
      # GitHub (incl. uv release tarball + python-build-standalone downloads)
      # + npm/bun + lintro (PyPI) + test fixtures (bulma.io, cdn.jsdelivr.net).
      allowed-endpoints: >-
        github.com:443
        api.github.com:443
        codeload.github.com:443
        objects.githubusercontent.com:443
        raw.githubusercontent.com:443
        release-assets.githubusercontent.com:443
        github-releases.githubusercontent.com:443
        pipelines.actions.githubusercontent.com:443
        pkg-containers.githubusercontent.com:443
        uploads.github.com:443
        registry.npmjs.org:443
        npmjs.org:443
        nodejs.org:443
        bun.sh:443
        bulma.io:443
        cdn.jsdelivr.net:443
        pypi.org:443
        files.pythonhosted.org:443
    permissions:
      contents: read

  # Retained from the pre-migration node-22 matrix leg: coverage reporting,
  # Pages artifacts, and the repo SBOM artifact. Not a required context.
  reporting:
    name: 📊 Coverage & Reporting
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Harden Runner
        if: ${{ !env.ACT }}
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: block
          allowed-endpoints: >
            anchore.io:443
            api.codecov.io:443
            api.github.com:443
            bulma.io:443
            bun.sh:443
            cdn.jsdelivr.net:443
            codecov.io:443
            codeload.github.com:443
            files.pythonhosted.org:443
            get.anchore.io:443
            github-releases.githubusercontent.com:443
            github.com:443
            npmjs.org:443
            objects.githubusercontent.com:443
            pkg-containers.githubusercontent.com:443
            pipelines.actions.githubusercontent.com:443
            pypi.org:443
            raw.githubusercontent.com:443
            registry.npmjs.org:443
            release-assets.githubusercontent.com:443
            uploader.codecov.io:443
            uploads.github.com:443
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: ${{ env.CHECKOUT_FETCH_DEPTH }}

      - name: Setup environment
        uses: ./.github/actions/setup-env
        with:
          node-version: '22'
          skip-ruby: 'true'

      - name: Validate commit messages
        if: github.event_name == 'pull_request'
        run: ./scripts/ci/validate-commit-messages.sh

      - name: Verify semantic release trigger
        if: github.event_name == 'pull_request'
        run: ./scripts/ci/verify-semantic-release-trigger.sh

      - name: Validate version sync
        run: ./scripts/ci/validate-version-sync.sh

      # Lint already gates the build legs (and quality-lintro.yml); skip it
      # here to avoid a third lintro pass.
      - name: Run CI pipeline
        run: ./scripts/local/build.sh --quick --skip-lint

      - name: Verify generated tokens and metadata are committed
        run: ./scripts/ci/verify-generated-tokens.sh

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5.5.4
        if: ${{ !env.ACT }}
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
          verbose: true

      - name: Upload coverage HTML for Pages
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        if: github.ref == 'refs/heads/main' && !env.ACT
        with:
          name: coverage-html
          path: coverage/
          retention-days: 30
          overwrite: true

      - name: Generate coverage summary for PR comment
        if: github.event_name == 'pull_request'
        run: ./scripts/ci/generate-coverage-summary.sh

      - name: Post coverage comment on PR
        if: github.event_name == 'pull_request' && !env.ACT
        uses: ./.github/actions/post-pr-comment
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          comment-file: coverage-comment.md
          marker: coverage-report

      - name: Generate coverage badges
        if: always()
        run: npm run coverage:badges

      - name: Upload coverage badges
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        if: always() && !env.ACT
        with:
          name: coverage-badges
          path: assets/static/badges
          if-no-files-found: ignore
          overwrite: true

      - name: Upload built site artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        if: always() && !env.ACT
        with:
          name: site-build
          path: apps/site/dist/
          overwrite: true

      - name: Install Syft (SBOM generator)
        run: ./scripts/ci/install-syft.sh

      - name: Generate SBOM (CycloneDX JSON)
        run: ./scripts/ci/generate-sbom.sh

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        if: always() && !env.ACT
        with:
          name: sbom-cyclonedx
          path: sbom.cyclonedx.json
          overwrite: true

  drift:
    name: 🧬 Verify Generated Artifacts
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        if: ${{ !env.ACT }}
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            bun.sh:443
            codeload.github.com:443
            files.pythonhosted.org:443
            github.com:443
            github-releases.githubusercontent.com:443
            npmjs.org:443
            objects.githubusercontent.com:443
            pypi.org:443
            raw.githubusercontent.com:443
            registry.npmjs.org:443
            release-assets.githubusercontent.com:443

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: ${{ env.CHECKOUT_FETCH_DEPTH }}

      - name: Setup environment
        uses: ./.github/actions/setup-env
        with:
          node-version: '22'
          skip-ruby: 'true'

      - name: Verify committed artifacts match regeneration
        run: ./scripts/ci/check-generated-drift.sh

  examples:
    name: 📦 Validate Examples
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    needs: build
    steps:
      - name: Harden Runner
        if: ${{ !env.ACT }}
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            bun.sh:443
            cdn.playwright.dev:443
            files.pythonhosted.org:443
            github-releases.githubusercontent.com:443
            github.com:443
            npmjs.org:443
            playwright-akamai.azureedge.net:443
            playwright-verizon.azureedge.net:443
            playwright.azureedge.net:443
            playwright.download.prss.microsoft.com:443
            pypi.org:443
            raw.githubusercontent.com:443
            registry.npmjs.org:443
            release-assets.githubusercontent.com:443
            storage.googleapis.com:443

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: ${{ env.CHECKOUT_FETCH_DEPTH }}

      - name: Setup environment
        uses: ./.github/actions/setup-env
        with:
          node-version: '22'
          skip-ruby: 'true'

      - name: Download built JS artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          # Matrix mode of reusable-build-artifact appends -<node-version>.
          name: js-dist-22
          path: dist/

      - name: Build core packages
        run: bun run build

      - name: Build all examples
        run: bun run examples:build

      - name: Install Playwright browsers
        run: cd examples && npx playwright install chromium

      - name: Run example tests (excluding Jekyll - requires Ruby)
        run: |
          cd examples
          bunx playwright test --config=playwright.config.ts \
            bootstrap/test/ \
            html-vanilla/test/ \
            react/test/ \
            tailwind/test/ \
            vue/test/
