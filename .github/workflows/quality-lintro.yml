---
name: Quality - Lint & Format

on:
  push:
    branches: [main]
  pull_request:
  merge_group:
    types: [checks_requested]
  workflow_dispatch:

permissions: {}

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Org ruleset (checks-turbo-themes): quality / 🛠️ Lintro Code Quality
  quality:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-quality-lint.yml@66cad82ead0e5d119928c895c7d7da9c837989e5 # v0.52.3
    with:
      job-name: '🛠️ Lintro Code Quality'
      # py-lintro 0.61.0 pinned to immutable digest for reproducibility
      # yamllint disable-line rule:line-length
      lintro-image: ghcr.io/lgtm-hq/py-lintro:0.61.0@sha256:95b9fd9d62c3ca1227447467767ec915e78a7eef62282dd18c0b1c02ee4d3887
      runner-image: ubuntu-24.04
      tooling-ref: '66cad82ead0e5d119928c895c7d7da9c837989e5' # v0.52.3
      egress-policy: block
      egress-preset: quality
    permissions:
      contents: read
      # pull the pinned ghcr.io/lgtm-hq/py-lintro image
      packages: read

  publish-quality-summary:
    needs: quality
    if: >-
      !cancelled()
      && github.event_name == 'pull_request'
      && github.event.pull_request.head.repo.fork == false
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-publish-quality-summary.yml@66cad82ead0e5d119928c895c7d7da9c837989e5 # v0.52.3
    with:
      exit-code: ${{ needs.quality.outputs.exit-code }}
      runner-image: ubuntu-24.04
      tooling-ref: '66cad82ead0e5d119928c895c7d7da9c837989e5' # v0.52.3
      egress-policy: block
      egress-preset: github-minimal
    permissions:
      contents: read
      pull-requests: write
