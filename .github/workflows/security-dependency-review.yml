---
name: Security - Dependency Vulnerability Scan

on:
  pull_request:
  merge_group:
    types: [checks_requested]
  push:
    branches: [main]
  schedule:
    # Weekly scan: Monday 05:30 UTC
    - cron: '30 5 * * 1'
  workflow_dispatch:

permissions: {}

concurrency:
  group: security-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Not a required check in checks-turbo-themes; no ruleset lockstep needed.
  # The reusable itself skips on push/schedule/dispatch events (it only runs
  # on pull_request and merge_group), so no caller-side if is needed.
  dependency-review:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-dependency-review.yml@66cad82ead0e5d119928c895c7d7da9c837989e5 # v0.52.3
    with:
      job-name: '🛡️ Dependency Review'
      fail-on-severity: high
      tooling-ref: '66cad82ead0e5d119928c895c7d7da9c837989e5' # v0.52.3
      egress-policy: block
      egress-preset: scorecard
      # Complete list, not append: the reusable feeds allowed-endpoints
      # directly to the harden-runner pre hook at job start, where a partial
      # list REPLACES the baked-in baseline (preset merging happens later in
      # resolve-egress-allowlist and cannot widen the already-armed agent).
      # Full list = scorecard preset + deps.dev metadata resolution.
      allowed-endpoints-mode: replace
      allowed-endpoints: >
        github.com:443
        api.github.com:443
        codeload.github.com:443
        objects.githubusercontent.com:443
        raw.githubusercontent.com:443
        pipelines.actions.githubusercontent.com:443
        gcr.io:443
        api.osv.dev:443
        api.scorecard.dev:443
        api.securityscorecards.dev:443
        api.deps.dev:443
        release-assets.githubusercontent.com:443
    permissions:
      # Read repository manifests and lockfiles.
      contents: read
      # Read-only: write is intentionally withheld so any reusable-internal
      # comment attempt fails explicitly rather than silently on fork PRs
      # (fork PRs do not receive secrets / write tokens from the base repo).
      pull-requests: read

  # Org ruleset (checks-turbo-themes): security-audit / 🔐 Security Audit
  security-audit:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-security-audit.yml@66cad82ead0e5d119928c895c7d7da9c837989e5 # v0.52.3
    with:
      job-name: '🔐 Security Audit'
      # py-lintro 0.61.0 pinned to immutable digest for reproducibility
      # yamllint disable-line rule:line-length
      lintro-image: ghcr.io/lgtm-hq/py-lintro:0.61.0@sha256:95b9fd9d62c3ca1227447467767ec915e78a7eef62282dd18c0b1c02ee4d3887
      runner-image: ubuntu-24.04
      tooling-ref: '66cad82ead0e5d119928c895c7d7da9c837989e5' # v0.52.3
      egress-policy: block
      egress-preset: quality
    permissions:
      contents: read
      packages: read

  publish-security-audit-comment:
    needs: security-audit
    if: >-
      !cancelled()
      && github.event_name == 'pull_request'
      && github.event.pull_request.head.repo.fork == false
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-publish-security-audit-comment.yml@66cad82ead0e5d119928c895c7d7da9c837989e5 # v0.52.3
    with:
      runner-image: ubuntu-24.04
      tooling-ref: '66cad82ead0e5d119928c895c7d7da9c837989e5' # v0.52.3
      egress-policy: block
      egress-preset: github-minimal
    permissions:
      contents: read
      pull-requests: write
