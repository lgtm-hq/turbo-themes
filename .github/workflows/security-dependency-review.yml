---
name: Security - Dependency Vulnerability Scan

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # Weekly scan: Monday 05:30 UTC
    - cron: '30 5 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-audit-${{ github.ref }}
  cancel-in-progress: true

env:
  LINTRO_IMAGE: ghcr.io/lgtm-hq/py-lintro:0.57.1

jobs:
  security-audit:
    name: "\U0001F510 Security Audit"
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: step-security/harden-runner@e3f713f2d8f53843e71c69a996d56f51aa9adfb9 # v2.14.1
        if: ${{ !env.ACT }}
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            api.osv.dev:443
            api.deps.dev:443
            github.com:443
            ghcr.io:443
            objects.githubusercontent.com:443
            pkg-containers.githubusercontent.com:443
            codeload.github.com:443

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Pull py-lintro Docker image
        run: ./scripts/ci/pull-lintro-image.sh

      - name: Run security audit
        id: audit
        continue-on-error: true
        run: ./scripts/ci/security-audit.sh

      - name: Post PR comment
        if: always() && github.event_name == 'pull_request'
        uses: ./.github/actions/post-pr-comment
        continue-on-error: true
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          comment-file: security-audit-comment.txt
          marker: security-audit-report

      - name: Fail on vulnerabilities
        if: steps.audit.outcome == 'failure'
        run: ./scripts/ci/fail-audit.sh
