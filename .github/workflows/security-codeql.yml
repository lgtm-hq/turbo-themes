name: Security - CodeQL Code Scanning

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
    types: [checks_requested]
  schedule:
    - cron: '0 5 * * 1'

permissions: {}

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Org ruleset (checks-turbo-themes): codeql / 🔬 CodeQL Analysis
  codeql:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-codeql.yml@66cad82ead0e5d119928c895c7d7da9c837989e5 # v0.52.3
    with:
      # javascript-typescript is a single CodeQL extractor covering both
      languages: javascript-typescript
      build-mode: none
      category: '/language:all'
      job-name: '🔬 CodeQL Analysis'
      tooling-ref: '66cad82ead0e5d119928c895c7d7da9c837989e5' # v0.52.3
      egress-policy: block
      egress-preset: github-tooling
      # Complete list, not append: the reusable feeds allowed-endpoints
      # directly to the harden-runner pre hook at job start, where a partial
      # list REPLACES the baked-in baseline (preset merging happens later in
      # resolve-egress-allowlist and cannot widen the already-armed agent).
      allowed-endpoints: >
        github.com:443
        api.github.com:443
        codeload.github.com:443
        objects.githubusercontent.com:443
        raw.githubusercontent.com:443
        uploads.github.com:443
        pipelines.actions.githubusercontent.com:443
        github-releases.githubusercontent.com:443
        release-assets.githubusercontent.com:443
        pkg-containers.githubusercontent.com:443
    permissions:
      contents: read
      security-events: write
