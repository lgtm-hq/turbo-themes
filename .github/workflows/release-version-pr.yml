---
name: Release - Version PR

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-version-pr
  cancel-in-progress: false

jobs:
  version-pr:
    name: Create or Update Version PR
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            pkg-containers.githubusercontent.com:443
            github-releases.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            pipelines.actions.githubusercontent.com:443
            registry.npmjs.org:443
            bun.sh:443

      - name: Create GitHub App installation token
        id: app-token
        # yamllint disable-line rule:line-length
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.2.2
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
          token: ${{ steps.app-token.outputs.token }}

      - name: Guard - Check if last commit is a release
        id: guard
        run: |
          chmod +x scripts/ci/guard-release-commit.sh
          scripts/ci/guard-release-commit.sh

      - name: Skip if release commit
        if: steps.guard.outputs.is_release == 'true'
        run: |
          echo "Skipping version PR - last commit was a release (prevents infinite loop)"
          exit 0

      - name: Configure Git
        if: steps.guard.outputs.is_release != 'true'
        run: ./scripts/ci/configure-git.sh

      - name: Setup Bun
        if: steps.guard.outputs.is_release != 'true'
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.13'

      - name: Setup Node.js
        if: steps.guard.outputs.is_release != 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        if: steps.guard.outputs.is_release != 'true'
        run: bun install --frozen-lockfile

      - name: Compute next version and update files
        if: steps.guard.outputs.is_release != 'true'
        id: version
        run: node scripts/ci/compute-next-version.mjs

      - name: Regenerate version-stamped artifacts
        if: steps.guard.outputs.is_release != 'true' && steps.version.outputs.bump_needed == 'true'
        run: ./scripts/ci/regenerate-release-artifacts.sh

      - name: Create or update version PR
        id: create_pr
        continue-on-error: true
        if: steps.guard.outputs.is_release != 'true' && steps.version.outputs.bump_needed == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        env:
          HUSKY: '0'
        with:
          token: ${{ steps.app-token.outputs.token }}
          sign-commits: true
          commit-message: 'chore(release): version ${{ steps.version.outputs.next_version }}'
          title: ${{ steps.version.outputs.pr_title }}
          body-path: ${{ steps.version.outputs.pr_body_file }}
          branch: release/version-${{ steps.version.outputs.next_version }}
          base: main
          labels: |
            release-bump
          delete-branch: true

      - name: Retry release branch push on transient rejection
        id: push_retry
        if: >-
          steps.guard.outputs.is_release != 'true' &&
          steps.version.outputs.bump_needed == 'true' &&
          steps.create_pr.outcome == 'failure'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          RELEASE_BRANCH: release/version-${{ steps.version.outputs.next_version }}
          PR_TITLE: ${{ steps.version.outputs.pr_title }}
          PR_BODY_FILE: ${{ steps.version.outputs.pr_body_file }}
        run: ./scripts/ci/retry-release-branch-push.sh

      - name: Fail if push could not be completed
        if: >-
          steps.create_pr.outcome == 'failure' &&
          steps.push_retry.outcome != 'success'
        run: ./scripts/ci/fail-release-push.sh

      - name: Request CODEOWNER review
        if: >-
          steps.create_pr.outputs.pull-request-number != '' ||
          steps.push_retry.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ steps.create_pr.outputs.pull-request-number || steps.push_retry.outputs.pull-request-number }}
        run: ./scripts/ci/request-codeowner-review.sh

      - name: Enable auto-merge
        if: >-
          steps.create_pr.outputs.pull-request-number ||
          steps.push_retry.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          PR="${{ steps.create_pr.outputs.pull-request-number || steps.push_retry.outputs.pull-request-number }}"
          gh pr merge "${PR}" --auto --squash

      - name: Generate Version PR Summary
        if: always()
        env:
          BUMP_NEEDED: ${{ steps.version.outputs.bump_needed }}
          NEXT_VERSION: ${{ steps.version.outputs.next_version }}
          PUSH_RETRY_TRIGGERED: ${{ steps.create_pr.outcome == 'failure' && steps.push_retry.outcome == 'success' }}
          PUSH_FAILED: ${{ steps.create_pr.outcome == 'failure' && steps.push_retry.outcome != 'success' }}
        run: ./scripts/ci/generate-version-pr-summary.sh
