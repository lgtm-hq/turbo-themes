---
name: Release - Publish PR

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g., v1.2.3)'
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Note: npm, PyPI, and RubyGems publishing are handled by separate workflows
  # (publish-npm.yml, publish-python.yml, publish-gem.yml) triggered on tag push

  github-release:
    name: 🚀 Create GitHub Release
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            pkg-containers.githubusercontent.com:443
            uploads.github.com:443

      - name: Create GitHub App installation token
        id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.2.2
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          token: ${{ steps.app-token.outputs.token }}
          body: |
            ## 📦 @turbocoder13/turbo-themes ${{ github.ref_name }}

            Published to npm: https://www.npmjs.com/package/@turbocoder13/turbo-themes

            ### 📋 Software Bill of Materials (SBOM)

            Signed SBOM files are attached to this release by the SBOM job
            immediately after publish (allow a few minutes for the assets to
            appear), in multiple formats:
            - **CycloneDX JSON**: `sbom.cyclonedx.json` (+ signature bundle)
            - **SPDX JSON**: `sbom.spdx.json` (+ signature bundle)
            - **CycloneDX XML**: `sbom.cyclonedx.xml` (+ signature bundle)

            All SBOM files are signed using [Sigstore](https://www.sigstore.dev/) keyless signing.

            ### 🔒 Security

            - All SBOM files are cryptographically signed
            - npm package includes [provenance attestation](https://docs.npmjs.com/generating-provenance-statements)
            - View [OpenSSF Scorecard](https://scorecard.dev/) for security metrics
          draft: false
          prerelease: false
          generate_release_notes: true

      - name: Summary
        shell: bash
        run: |
          {
            echo "## GitHub Release Summary"
            echo "✅ Release ${{ github.ref_name }} published and released"
          } >> "$GITHUB_STEP_SUMMARY"

  # Generate multi-format SBOMs at the release tag, cosign-sign them, and
  # attach them to the release created above (lgtm-ci reusable-sbom.yml
  # release-assets mode; lgtm-ci#520).
  sbom:
    needs: [github-release]
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-sbom.yml@b534217fcb869368b69014dc9732a0eda6fde4ee # v0.59.2
    with:
      mode: release-assets
      job-name: '📋 Generate & Sign SBOM'
      target: .
      target-type: dir
      formats: 'spdx-json,cyclonedx-json,cyclonedx-xml'
      sign: true
      release-tag: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      tooling-ref: 'b534217fcb869368b69014dc9732a0eda6fde4ee'  # v0.59.2
      egress-policy: block
      egress-preset: sbom
    permissions:
      contents: write
      id-token: write
