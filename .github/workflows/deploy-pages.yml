---
name: Deploy - GitHub Pages

on:
  workflow_run:
    workflows: ['Quality Check - CI Pipeline']
    types:
      - completed
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  # actions: write is required by lgtm-ci Model B (no prune-toggle input as of
  # v0.59.0). Bundle download only needs read; write is solely so
  # delete-run-pages-artifacts.sh can remove a stale same-run `github-pages`
  # artifact before upload (lgtm-ci #415). Without write, `gh run rerun --failed`
  # hard-fails with "Artifact count is 2". Scope is the job-scoped GITHUB_TOKEN
  # only — see TRIGGERS.md "Caller permissions".
  actions: write

jobs:
  pages:
    name: Deploy site with reports
    if: >-
      (github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.head_repository.full_name == github.repository) ||
      github.event_name == 'workflow_dispatch'
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-deploy-site-with-reports.yml@b534217fcb869368b69014dc9732a0eda6fde4ee # v0.59.2
    with:
      tooling-ref: b534217fcb869368b69014dc9732a0eda6fde4ee # v0.59.2
      site-root: apps/site/dist
      working-directory: .
      package-manager: bun
      node-version: '22'
      build-command: bash scripts/ci/build-pages-site.sh
      bundle-manifest: .github/pages-bundle-manifest.json
      # Fail the bundle step if any manifest entry cannot be resolved (matches
      # pages-bundle-manifest.json "strict": true). Orthogonal to per-entry
      # require_success — see TRIGGERS.md.
      strict-bundle: true
      commit-sha: ${{ github.event.workflow_run.head_sha || github.sha }}
      # Explicit opt-in: path-triggered workflows (Examples, Multi-Language Coverage)
      # may not run for every main commit; fall back to latest artifacts on main.
      fallback-ref: main
      egress-policy: block
      timeout-minutes: 15
      # Full build allowlist: lgtm-ci bun/npm defaults + monorepo Ruby/Python/Astral
      # endpoints (setup-env legacy). Passed as a complete list because a non-empty
      # allowed-endpoints-build replaces the reusable's first harden-runner allowlist.
      allowed-endpoints-build: >
        actions.githubusercontent.com:443
        api.github.com:443
        api.rubygems.org:443
        bun.sh:443
        bundler.rubygems.org:443
        cache.ruby-lang.org:443
        codeload.github.com:443
        files.pythonhosted.org:443
        github-releases.githubusercontent.com:443
        github.com:443
        index.rubygems.org:443
        npmjs.org:443
        objects.githubusercontent.com:443
        pkg-containers.githubusercontent.com:443
        pipelines.actions.githubusercontent.com:443
        pypi.org:443
        raw.githubusercontent.com:443
        release-assets.githubusercontent.com:443
        releases.astral.sh:443
        registry.npmjs.org:443
        rubygems-downloads.global.ssl.fastly.net:443
        rubygems.global.ssl.fastly.net:443
        rubygems.org:443
      allowed-endpoints-deploy: >
        actions.githubusercontent.com:443
        api.github.com:443
        github.com:443
        objects.githubusercontent.com:443
        pipelines.actions.githubusercontent.com:443
        release-assets.githubusercontent.com:443
        uploads.github.com:443
